<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Kylie y la Gallinita Lola</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#b7ecff;
    overflow:hidden;
    touch-action:none;
  }
  #gameWrap{
    width:100vw;height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(#9ee7ff,#dff8ff);
  }
  canvas{
    width:100vw;
    height:100vh;
    image-rendering:pixelated;
    background:#8bd66f;
  }
  #muteBtn{
    position:fixed;
    left:18px;
    bottom:24px;
    width:132px;
    height:52px;
    border-radius:16px;
    border:3px solid #333;
    background:rgba(255,255,255,.9);
    font-weight:900;
    font-size:15px;
    box-shadow:0 6px 14px rgba(0,0,0,.22);
    z-index:5;
  }
  #jumpBtn{
    position:fixed;
    right:22px;
    bottom:24px;
    width:112px;
    height:112px;
    border-radius:50%;
    border:4px solid #d45b94;
    background:rgba(255,211,232,.9);
    font-weight:900;
    font-size:18px;
    box-shadow:0 8px 16px rgba(0,0,0,.22);
    display:flex;
    align-items:center;
    justify-content:center;
    user-select:none;
    -webkit-user-select:none;
  }
  @media (min-width:800px){
    #jumpBtn{display:none}
  }
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="game" width="960" height="540"></canvas>
</div>
<button id="muteBtn">🔊 Música</button>
<div id="jumpBtn">SALTAR</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

const W = canvas.width;
const H = canvas.height;

let state = "menu";
let level = 1;
let score = 0;
let lives = 3;
let frame = 0;
let speed = 4;
let distance = 0;
let message = "";
let messageTimer = 0;
let floatingTexts = [];
let goldenActive = false;
let goldenTimer = 0;
let musicMuted = false;
let enemies = [];

const motivationalPhrases = [
  "¡Lo estás haciendo súper Kylie!",
  "¡Tú puedes Kylie!",
  "¡Vamos Kylie, sigue así!",
  "¡Eres una campeona Kylie!",
  "¡Lola está feliz contigo Kylie!"
];

const groundY = 405;
const gravity = 0.62;

let lola;
let obstacles = [];
let prizes = [];
let clouds = [];
let hills = [];
let flowers = [];

const levelData = [
  {name:"Pradera Dulce", speed:2.1, targetScore:80, obstacleRate:175, prizeRate:78},
  {name:"Camino de Maíz", speed:2.4, targetScore:180, obstacleRate:160, prizeRate:72},
  {name:"Ruta Estrella", speed:2.7, targetScore:320, obstacleRate:145, prizeRate:66},
  {name:"Mundo Arcoíris", speed:3.0, targetScore:500, obstacleRate:130, prizeRate:60}
];

function resetLola(){
  lola = {
    x:120,
    y:groundY-76,
    w:70,
    h:70,
    vy:0,
    jumping:false,
    inv:0,
    walk:0
  };
}

function rand(min,max){ return Math.random()*(max-min)+min; }

function rects(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}




// --- MUSICA COMPLETA POR NIVEL ---
let musicTimer = null;
let currentMusicMode = null;
let musicStep = 0;

const levelMusic = [
  {
    tempo: 230,
    melody:[523,587,659,784,659,587,523,392,440,523,587,659,587,523,440,392],
    bass:[131,131,196,196,174,174,196,196],
    beat:[1,0,0,1,0,0,1,0]
  },
  {
    tempo: 210,
    melody:[392,440,494,587,523,494,440,392,494,523,587,659,587,523,494,440],
    bass:[196,196,147,147,165,165,196,196],
    beat:[1,0,1,0,0,1,0,1]
  },
  {
    tempo: 190,
    melody:[659,784,880,784,659,587,659,784,880,988,880,784,659,587,523,587],
    bass:[165,165,220,220,196,196,247,247],
    beat:[1,1,0,1,0,1,1,0]
  },
  {
    tempo: 170,
    melody:[784,880,988,1046,988,880,784,659,880,988,1174,1046,988,880,784,659],
    bass:[196,247,220,196,262,247,220,196],
    beat:[1,0,1,1,0,1,0,1]
  }
];

const heroTheme = {
  tempo: 125,
  melody:[784,988,1174,1318,1174,988,1046,1318,1568,1318,1174,1046,988,1174,1318,1568],
  bass:[196,196,247,247,262,262,247,247],
  beat:[1,1,1,0,1,1,0,1]
};

function getAudio(){
  return window.audioCtx || (window.audioCtx = new (window.AudioContext||window.webkitAudioContext)());
}

function playTone(freq, duration=0.12, type="sine", volume=0.04){
  if(musicMuted) return;
  const ctx = getAudio();
  const o = ctx.createOscillator();
  const g = ctx.createGain();

  o.frequency.value = freq;
  o.type = type;

  g.gain.setValueAtTime(0.0001, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(volume, ctx.currentTime + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);

  o.connect(g);
  g.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime + duration + 0.03);
}

function playNoise(duration=0.05, volume=0.025){
  if(musicMuted) return;
  const ctx = getAudio();
  const buffer = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i] = Math.random()*2-1;

  const src = ctx.createBufferSource();
  const g = ctx.createGain();
  g.gain.value = volume;

  src.buffer = buffer;
  src.connect(g);
  g.connect(ctx.destination);
  src.start();
  src.stop(ctx.currentTime + duration);
}

function stopAllMusic(){
  if(musicTimer){
    clearInterval(musicTimer);
    musicTimer = null;
  }
  currentMusicMode = null;
  musicStep = 0;
}

function startSequencer(theme, mode){
  if(currentMusicMode === mode) return;
  stopAllMusic();
  currentMusicMode = mode;
  musicStep = 0;

  musicTimer = setInterval(()=>{
    const m = theme.melody[musicStep % theme.melody.length];
    const b = theme.bass[Math.floor(musicStep/2) % theme.bass.length];
    const beat = theme.beat[musicStep % theme.beat.length];

    // melodía principal
    playTone(m, 0.16, "triangle", 0.042);

    // armonía suave cada dos pasos
    if(musicStep % 2 === 0){
      playTone(m * 1.25, 0.12, "sine", 0.018);
    }

    // bajo
    if(musicStep % 2 === 0){
      playTone(b, 0.22, "square", 0.026);
    }

    // percusión suave
    if(beat){
      playNoise(0.045, 0.018);
    }

    musicStep++;
  }, theme.tempo);
}

function playBgMusic(){
  if(musicMuted) return;
  const idx = Math.max(0, Math.min(level-1, levelMusic.length-1));
  startSequencer(levelMusic[idx], "level-" + level);
}

function stopBgMusic(){
  if(currentMusicMode && currentMusicMode.startsWith("level")){
    stopAllMusic();
  }
}

function playHeroMusic(){
  if(musicMuted) return;
  startSequencer(heroTheme, "hero");
}

function stopHeroMusic(){
  if(currentMusicMode === "hero"){
    stopAllMusic();
  }
}

function beep(freq=440,dur=.06){
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!window.audioCtx) window.audioCtx = new AC();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value=freq;
    o.type="square";
    g.gain.value=.04;
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

function startLevel(n){
  const cfg = levelData[n-1];
  level = n;
  speed = cfg.speed;
  distance = 0;
  obstacles = [];
  prizes = [];
  enemies = [];
  floatingTexts = [];
  clouds = [];
  hills = [];
  flowers = [];
  resetLola();

  for(let i=0;i<8;i++){
    clouds.push({x:rand(0,W), y:rand(35,150), s:rand(.8,1.5), dx:rand(.25,.55)});
  }
  for(let i=0;i<7;i++){
    hills.push({x:i*220, y:groundY-70-rand(0,35), w:260, h:90});
  }
  for(let i=0;i<24;i++){
    flowers.push({x:rand(0,W), y:rand(groundY+20,H-25), c:["#ff75a0","#ffe066","#a78bfa","#fff"][i%4]});
  }

  message = "Nivel " + level + ": " + cfg.name;
  messageTimer = 140;
  state = "play";
  if(window.audioCtx && !goldenActive) playBgMusic();
}

function resetGame(){
  stopHeroMusic();
  playBgMusic();
  score = 0;
  lives = 3;
  startLevel(1);
}

function jump(){
  if(state === "menu"){ resetGame(); return; }
  if(state === "gameover" || state === "win"){ resetGame(); return; }
  if(!lola.jumping){
    lola.jumping = true;
    lola.vy = -17;
    beep(650,.05);
  }
}

function spawnThings(){
  const cfg = levelData[level-1];

  if(frame % Math.max(105, Math.floor(cfg.obstacleRate - level*2)) === 0){
    const type = Math.random() > .45 ? "rock" : "cactus";
    obstacles.push({
      x:W+50,
      y:type==="rock" ? groundY-36 : groundY-58,
      w:type==="rock" ? 40 : 34,
      h:type==="rock" ? 34 : 56,
      type
    });
  }

  if(frame % Math.max(35, Math.floor(cfg.prizeRate - level*4)) === 0){
    const t = ["corn","star","heart"][Math.floor(Math.random()*3)];
    const high = Math.random()>.5;
    prizes.push({
      x:W+60,
      y:high ? groundY-150-rand(0,35) : groundY-95,
      w:34,
      h:34,
      type:t,
      taken:false,
      bob:rand(0,30)
    });
  }
}

function hitLife(){
  if(lola.inv > 0 || goldenActive) return;
  lives--;
  lola.inv = 95;
  message = "¡Cuidado Lola!";
  messageTimer = 70;
  beep(130,.08);
  if(lives <= 0){
    state = "gameover";
  }
}

function update(){
  frame++;
  if(messageTimer>0) messageTimer--;
  if(state !== "play") return;

  spawnThings();

// generar huevo dorado ocasional
if(frame % 500 === 0){
  prizes.push({
    x:W+60,
    y:groundY-120,
    w:40,
    h:40,
    type:"gold",
    taken:false,
    bob:0
  });
}

// enemigos con dificultad baja y escalable por nivel
const enemyRate = Math.max(190, 430 - level * 55);
if(frame % enemyRate === 0){
  enemies.push({
    x:W+70,
    y:groundY-54,
    w:46,
    h:44,
    speed:speed + 0.5 + level * 0.18,
    type: level % 2 === 0 ? "fox" : "bug"
  });
}

  distance += speed;

  lola.walk += speed * 2.2;
  lola.y += lola.vy;
  lola.vy += gravity;

  if(lola.y >= groundY-lola.h){
    lola.y = groundY-lola.h;
    lola.vy = 0;
    lola.jumping = false;
  }

  obstacles.forEach(o => o.x -= speed);
  prizes.forEach(p => p.x -= speed);
  enemies.forEach(e => e.x -= e.speed);
  clouds.forEach(c => {
    c.x -= c.dx;
    if(c.x < -120) c.x = W + 120;
  });
  hills.forEach(h => {
    h.x -= speed*.35;
    if(h.x < -280) h.x = W + 80;
  });
  flowers.forEach(f => {
    f.x -= speed;
    if(f.x < -20) f.x = W + rand(0,80);
  });

  obstacles = obstacles.filter(o => o.x > -100);
  prizes = prizes.filter(p => p.x > -100 && !p.taken);
  enemies = enemies.filter(e => e.x > -100);

  const lolaHit = {x:lola.x+12, y:lola.y+12, w:lola.w-24, h:lola.h-14};
  for(const o of obstacles){
    if(rects(lolaHit, o)){
      hitLife();
      o.x = -120;
      break;
    }
  }

  for(const e of enemies){
    if(rects(lolaHit, e)){
      if(goldenActive){
        score += 2;
        floatingTexts.push({x:e.x,y:e.y,text:"+2 pts",life:60});
        e.x = -120;
        beep(700,.05);
      }else{
        hitLife();
        e.x = -120;
      }
      break;
    }
  }

  for(const p of prizes){
    if(rects({x:lola.x,y:lola.y,w:lola.w,h:lola.h}, p)){
      p.taken = true;
      // Clasificación de premios
      let gained = 1;
      if(p.type==="star") gained = 5;
      else if(p.type==="heart") gained = 3;
      else if(p.type==="gold") gained = 0;
      else gained = 1;

      score += gained;

      if(p.type==="gold"){
        goldenActive = true;
        goldenTimer = 180;
        message = "✨ ¡Gallina dorada invencible!";
        messageTimer = 90;
        stopBgMusic();
        playHeroMusic();
      }

      floatingTexts.push({
        x:p.x,
        y:p.y,
        text:"+" + gained + " pts",
        life:60
      });

      beep(900,.04);
    }
  }

  floatingTexts.forEach(t=>{
    t.y -= 0.8;
    t.life--;
  });
  floatingTexts = floatingTexts.filter(t=>t.life>0);

  if(goldenActive){
    goldenTimer--;
    if(goldenTimer<=0){
      goldenActive=false;
      stopHeroMusic();
      playBgMusic();
    }
  }

  if(lola.inv>0) lola.inv--;

  const cfg = levelData[level-1];
  if(score >= cfg.targetScore){
    if(level < levelData.length){
      const next = level + 1;
      startLevel(next);
      message = motivationalPhrases[(next-2) % motivationalPhrases.length];
      messageTimer = 170;
    }else{
      state = "win";
    }
  }
}

function drawPixelChicken(x,y,scale=4,walk=0){
  ctx.save();
  ctx.translate(Math.round(x), Math.round(y));
  ctx.scale(scale,scale);

  const step = Math.floor(walk/4)%4;
  const line=(x,y,w,h,c)=>{ctx.fillStyle=c;ctx.fillRect(x,y,w,h);};
  const px=(x,y,c)=>{ctx.fillStyle=c;ctx.fillRect(x,y,1,1);};

  // cuerpo contorno
  line(3,5,7,1,"#222"); line(2,6,1,5,"#222"); line(10,6,1,2,"#222");
  line(1,10,1,4,"#222"); line(2,14,2,1,"#222"); line(4,15,7,1,"#222");
  line(11,14,2,1,"#222"); line(13,12,1,2,"#222");
  line(14,9,1,3,"#222"); line(12,8,2,1,"#222");

  // cuerpo blanco
  line(3,6,7,1,"#fff"); line(3,7,8,2,"#fff"); line(2,9,10,5,"#fff");
  line(4,14,7,1,"#fff"); line(12,9,2,3,"#fff");

  // ala
  line(3,9,1,4,"#bbb"); line(4,12,4,1,"#ddd"); line(4,13,5,1,"#bbb");

  // cabeza
  line(9,2,4,1,"#222"); line(8,3,6,1,"#222"); line(8,4,6,5,"#222");
  line(9,4,4,4,"#fff"); line(10,3,3,1,"#fff");

  // cresta
  line(9,0,4,1,"#222"); line(10,1,4,1,"#222");
  line(9,1,4,1,"#e22"); line(11,2,3,1,"#e22");

  // ojo y pico
  px(12,5,"#111");
  line(14,6,2,1,"#f5b22d"); line(14,7,1,1,"#f5b22d");

  // patas animadas tipo carrera, visibles debajo del cuerpo
  const foot = "#f39c12";
  const dark = "#a85f00";
  if(step===0){
    line(5,16,1,4,foot); line(3,20,5,1,foot); line(3,21,2,1,dark);
    line(10,16,1,3,foot); line(10,19,4,1,foot); line(13,20,2,1,dark);
  }else if(step===1){
    line(6,16,1,4,foot); line(5,20,4,1,foot); line(5,21,2,1,dark);
    line(9,16,1,4,foot); line(8,20,4,1,foot); line(10,21,2,1,dark);
  }else if(step===2){
    line(5,16,1,3,foot); line(2,19,5,1,foot); line(2,20,2,1,dark);
    line(10,16,1,4,foot); line(9,20,5,1,foot); line(12,21,2,1,dark);
  }else{
    line(6,16,1,4,foot); line(4,20,4,1,foot); line(4,21,2,1,dark);
    line(9,16,1,4,foot); line(9,20,4,1,foot); line(11,21,2,1,dark);
  }

  ctx.restore();
}

function drawWorld(){
  // cielo
  ctx.fillStyle="#91e7ff";
  ctx.fillRect(0,0,W,H);

  // nubes
  clouds.forEach(c=>{
    ctx.fillStyle="rgba(255,255,255,.75)";
    ctx.beginPath();
    ctx.arc(c.x,c.y,18*c.s,0,Math.PI*2);
    ctx.arc(c.x+24*c.s,c.y+3,22*c.s,0,Math.PI*2);
    ctx.arc(c.x+50*c.s,c.y,16*c.s,0,Math.PI*2);
    ctx.fill();
  });

  // montañas / mundo plano tipo ruta
  hills.forEach(h=>{
    ctx.fillStyle="#57b85c";
    ctx.beginPath();
    ctx.ellipse(h.x,h.y,h.w/2,h.h,0,0,Math.PI*2);
    ctx.fill();
  });

  // piso plano
  ctx.fillStyle="#75cf5b";
  ctx.fillRect(0,groundY,W,H-groundY);

  // camino plano
  ctx.fillStyle="#d9b879";
  ctx.fillRect(0,groundY+45,W,78);

  // línea de suelo
  ctx.fillStyle="#3f8f3c";
  ctx.fillRect(0,groundY,W,8);

  // flores animadas
  flowers.forEach(f=>{
    ctx.fillStyle=f.c;
    ctx.fillRect(f.x,f.y,5,5);
    ctx.fillStyle="#2b8a3e";
    ctx.fillRect(f.x+2,f.y+5,2,6);
  });

  // obstáculos
  obstacles.forEach(o=>{
    if(o.type==="rock"){
      ctx.fillStyle="#555"; ctx.fillRect(o.x+6,o.y+12,38,28);
      ctx.fillStyle="#777"; ctx.fillRect(o.x+13,o.y+2,27,22);
      ctx.fillStyle="#333"; ctx.fillRect(o.x+6,o.y+36,38,6);
    }else{
      ctx.fillStyle="#2f9e44";
      ctx.fillRect(o.x+15,o.y,14,68);
      ctx.fillRect(o.x+2,o.y+23,28,12);
      ctx.fillRect(o.x+25,o.y+36,18,12);
      ctx.fillStyle="#1f6f31";
      ctx.fillRect(o.x+17,o.y+5,4,58);
    }
  });

  // enemigos
  enemies.forEach(e=>{
    if(e.type==="fox"){
      ctx.fillStyle="#d96b27";
      ctx.fillRect(e.x+8,e.y+12,30,24);
      ctx.fillRect(e.x+30,e.y+4,15,18);
      ctx.fillStyle="#fff";
      ctx.fillRect(e.x+4,e.y+22,10,10);
      ctx.fillStyle="#222";
      ctx.fillRect(e.x+38,e.y+10,4,4);
      ctx.fillStyle="#8a3f15";
      ctx.fillRect(e.x+6,e.y+35,8,7);
      ctx.fillRect(e.x+30,e.y+35,8,7);
    }else{
      ctx.fillStyle="#6b4fbb";
      ctx.fillRect(e.x+8,e.y+14,32,22);
      ctx.fillStyle="#222";
      ctx.fillRect(e.x+14,e.y+20,4,4);
      ctx.fillRect(e.x+30,e.y+20,4,4);
      ctx.fillStyle="#3b2b78";
      ctx.fillRect(e.x+8,e.y+36,8,5);
      ctx.fillRect(e.x+30,e.y+36,8,5);
    }
  });

  // premios
  prizes.forEach(p=>{
    const y = p.y + Math.sin((frame+p.bob)/10)*5;
    if(p.type==="gold"){
      ctx.fillStyle="#ffd700";
      ctx.beginPath();
      ctx.ellipse(p.x+17,y+17,16,22,0,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle="#fff";
      ctx.fillRect(p.x+14,y+10,6,6);
    }else if(p.type==="corn"){
      ctx.fillStyle="#ffcf33";
      ctx.fillRect(p.x+10,y+2,14,28);
      ctx.fillStyle="#2f9e44";
      ctx.fillRect(p.x+4,y+18,8,16);
      ctx.fillRect(p.x+24,y+18,8,16);
    }else if(p.type==="star"){
      ctx.fillStyle="#ffd43b";
      ctx.beginPath();
      for(let i=0;i<10;i++){
        const a=-Math.PI/2+i*Math.PI/5;
        const r=i%2?8:18;
        ctx.lineTo(p.x+17+Math.cos(a)*r,y+17+Math.sin(a)*r);
      }
      ctx.fill();
    }else{
      ctx.fillStyle="#ff5c8a";
      ctx.fillRect(p.x+8,y+10,20,18);
      ctx.fillRect(p.x+4,y+14,28,12);
    }
  });

  // textos flotantes de puntos
  floatingTexts.forEach(t=>{
    ctx.save();
    ctx.globalAlpha = Math.max(0, t.life/60);
    ctx.fillStyle = "#fff";
    ctx.strokeStyle = "#222";
    ctx.lineWidth = 4;
    ctx.font = "bold 24px monospace";
    ctx.strokeText(t.text, t.x, t.y);
    ctx.fillText(t.text, t.x, t.y);
    ctx.restore();
  });

  // sombra y gallina
  if(state==="play" || state==="gameover" || state==="win"){
    ctx.fillStyle="rgba(0,0,0,.18)";
    ctx.beginPath();
    ctx.ellipse(lola.x+35, groundY-8, lola.jumping?22:30, 8, 0, 0, Math.PI*2);
    ctx.fill();

    if(!lola.inv || lola.inv%12<6){
      if(goldenActive){
      ctx.filter = "brightness(1.5) sepia(1) hue-rotate(30deg) saturate(3)";
      drawPixelChicken(lola.x,lola.y,4,lola.walk);
      ctx.filter = "none";
    }else{
      drawPixelChicken(lola.x,lola.y,4,lola.walk);
    }
    }
  }
}

function drawHUD(){
  const cfg = levelData[level-1];
  const prevTarget = level === 1 ? 0 : levelData[level-2].targetScore;
  const progress = Math.min(1, (score - prevTarget) / (cfg.targetScore - prevTarget));

  // Panel superior limpio
  ctx.fillStyle="rgba(255,255,255,.92)";
  ctx.fillRect(14,14,W-28,86);
  ctx.strokeStyle="#2b5f2b";
  ctx.lineWidth=3;
  ctx.strokeRect(14,14,W-28,86);

  ctx.fillStyle="#222";
  ctx.font="bold 20px monospace";
  ctx.fillText("🐔 Lola corre sola",32,42);
  ctx.fillText("Nivel "+level,300,42);
  ctx.fillText("Puntos: "+score,430,42);
  ctx.fillText("Vidas: "+"❤".repeat(lives),620,42);

  ctx.font="16px monospace";
  ctx.fillText("Premios: ⭐=5 ❤️=3 🌽=1 | Evita enemigos. Dorada los vence +2",32,72);

  // Barra de avance por puntos
  const barX = W-295;
  const barY = 63;
  const barW = 250;
  ctx.fillStyle="#ddd";
  ctx.fillRect(barX,barY,barW,14);
  ctx.fillStyle="#55c85a";
  ctx.fillRect(barX,barY,barW*progress,14);
  ctx.strokeStyle="#222";
  ctx.lineWidth=2;
  ctx.strokeRect(barX,barY,barW,14);

  ctx.fillStyle="#222";
  ctx.font="bold 14px monospace";
  ctx.fillText("Meta: "+cfg.targetScore+" pts",barX+55,58);

  if(messageTimer>0){
    ctx.fillStyle="rgba(0,0,0,.58)";
    ctx.fillRect(W/2-310,120,620,58);
    ctx.fillStyle="#fff";
    ctx.textAlign="center";
    ctx.font="bold 26px monospace";
    ctx.fillText(message,W/2,158);
    ctx.textAlign="left";
  }
}

function drawMenu(){
  ctx.fillStyle="#91e7ff";
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle="#75cf5b";
  ctx.fillRect(0,groundY,W,H-groundY);
  ctx.fillStyle="#d9b879";
  ctx.fillRect(0,groundY+45,W,78);

  drawPixelChicken(W/2-95,240,8,frame);

  ctx.fillStyle="#222";
  ctx.textAlign="center";
  ctx.font="bold 42px monospace";
  ctx.fillText("Kylie y la Gallinita Lola",W/2,92);

  ctx.font="22px monospace";
  ctx.fillText("Lola corre sola. Junta premios, gana puntos y pasa de nivel.",W/2,132);

  ctx.fillStyle="#fff7b2";
  ctx.fillRect(W/2-150,H-145,300,72);
  ctx.strokeStyle="#222";
  ctx.lineWidth=4;
  ctx.strokeRect(W/2-150,H-145,300,72);

  ctx.fillStyle="#222";
  ctx.font="bold 30px monospace";
  ctx.fillText("JUGAR",W/2,H-98);

  ctx.font="18px monospace";
  ctx.fillText("PC: espacio | Teléfono: botón SALTAR",W/2,H-32);
  ctx.textAlign="left";
}

function drawEnd(title, subtitle){
  drawWorld();
  ctx.fillStyle="rgba(0,0,0,.62)";
  ctx.fillRect(0,0,W,H);

  ctx.textAlign="center";
  ctx.fillStyle="#fff";
  ctx.font="bold 48px monospace";
  ctx.fillText(title,W/2,H/2-60);
  ctx.font="24px monospace";
  ctx.fillText(subtitle,W/2,H/2-10);

  ctx.fillStyle="#fff7b2";
  ctx.fillRect(W/2-170,H/2+40,340,72);
  ctx.strokeStyle="#222";
  ctx.lineWidth=4;
  ctx.strokeRect(W/2-170,H/2+40,340,72);

  ctx.fillStyle="#222";
  ctx.font="bold 28px monospace";
  ctx.fillText("JUGAR DE NUEVO",W/2,H/2+87);
  ctx.textAlign="left";
}

function draw(){
  ctx.clearRect(0,0,W,H);

  if(state==="menu"){
    drawMenu();
    return;
  }

  drawWorld();

  if(state==="play"){
    drawHUD();
  }

  if(state==="gameover"){
    drawEnd("GAME OVER", "Puntos: " + score);
  }

  if(state==="win"){
    drawEnd("¡GANASTE!", "Kylie ayudó a Lola. Puntos: " + score);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

function checkButtonClick(clientX,clientY){
  const r = canvas.getBoundingClientRect();
  const x = (clientX-r.left)*W/r.width;
  const y = (clientY-r.top)*H/r.height;

  if(state==="menu"){
    if(x>W/2-170 && x<W/2+170 && y>H-165 && y<H-50) resetGame();
  }else if(state==="gameover" || state==="win"){
    if(x>W/2-190 && x<W/2+190 && y>H/2+25 && y<H/2+135) resetGame();
  }else{
    jump();
  }
}

window.addEventListener("keydown", e=>{
  if(e.code==="Space" || e.key==="ArrowUp"){
    e.preventDefault();
    jump();
  }
  if(e.key==="Enter" && state==="menu") resetGame();
});

canvas.addEventListener("click", e=>checkButtonClick(e.clientX,e.clientY));
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  checkButtonClick(e.touches[0].clientX,e.touches[0].clientY);
},{passive:false});

const muteBtn = document.getElementById("muteBtn");
muteBtn.addEventListener("click", ()=>{
  musicMuted = !musicMuted;
  muteBtn.textContent = musicMuted ? "🔇 Silencio" : "🔊 Música";
  if(musicMuted){
    stopAllMusic();
  }else if(state==="play"){
    if(goldenActive) playHeroMusic();
    else playBgMusic();
  }
});

const jumpBtn = document.getElementById("jumpBtn");
jumpBtn.addEventListener("touchstart", e=>{e.preventDefault(); jump();},{passive:false});
jumpBtn.addEventListener("mousedown", e=>{e.preventDefault(); jump();});

resetLola();
loop();
</script>

<audio id="bgMusic" loop></audio>
<audio id="heroMusic" loop></audio>
</body>
</html>
