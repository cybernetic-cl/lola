// ─── helper: dibuja grid 2D en ctx ─────────────────────
function blitGrid(ctx2,grid,ox,oy,ps){
  for(let r=0;r<grid.length;r++){
    const row=grid[r];
    for(let c=0;c<row.length;c++){
      if(!row[c]) continue;
      ctx2.fillStyle=row[c];
      ctx2.fillRect(ox+c*ps|0, oy+r*ps|0, ps, ps);
    }
  }
}

function makeOC(w2,h2){
  try{ return new OffscreenCanvas(w2,h2); }
  catch(e){ const c=document.createElement('canvas'); c.width=w2; c.height=h2; return c; }
}

// CANVAS SETUP — canvas real en px físicos
// ═══════════════════════════════════════════
const cvs=document.getElementById('gc');
const ctx=cvs.getContext('2d',{alpha:false});
ctx.imageSmoothingEnabled=false;

// dimensiones lógicas del mundo de diseño
const DW=400, DH=148;

// variables del viewport (se recalculan en resize)
let CW=0, CH=0, SCL=1, DPR=1;

// tamaño de un pixel de diseño en px físicos
function ps(){ return Math.max(2, Math.round(SCL*DPR)); }

// escala coord lógica → px físico
function sc(v){ return Math.round(v*SCL*DPR); }

// caches de sprites (OffscreenCanvas)
let sprCache=[], obsCache=[], przCache=[];
let bgGrass=null, bgCloud=null;

function buildCache(){
  const p=ps();
  sprCache=ALL_FRAMES.map(grid=>{
    const oc=makeOC(SPR_COLS*p, SPR_ROWS*p);
    blitGrid(oc.getContext('2d'),grid,0,0,p);
    return oc;
  });
  obsCache=OBS_DEF.map(d=>{
    const oc=makeOC(d.w*p,d.h*p);
    blitGrid(oc.getContext('2d'),d.grid,0,0,p);
    return oc;
  });
  przCache=PRZ_DEF.map(d=>{
    const oc=makeOC(d.w*p,d.h*p);
    blitGrid(oc.getContext('2d'),d.grid,0,0,p);
    return oc;
  });
  // tile hierba
  const tw=T_GRASS[0].length*p, th=T_GRASS.length*p;
  bgGrass=makeOC(tw,th);
  blitGrid(bgGrass.getContext('2d'),T_GRASS,0,0,p);
  // nube
  const cw2=T_CLOUD[0].length*p, ch2=T_CLOUD.length*p;
  bgCloud=makeOC(cw2,ch2);
  blitGrid(bgCloud.getContext('2d'),T_CLOUD,0,0,p);
}

function doResize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  const cssW=Math.min(window.innerWidth-2,800);
  const maxCssH=window.innerHeight-80;
  const cssH2=cssW*DH/DW;
  const adjCssW=cssH2>maxCssH ? maxCssH*DW/DH : cssW;
  SCL=adjCssW/DW;
  CW=Math.round(adjCssW*DPR);
  CH=Math.round(CW*DH/DW);
  cvs.width=CW; cvs.height=CH;
  cvs.style.width=Math.round(adjCssW)+'px';
  cvs.style.height=Math.round(adjCssW*DH/DW)+'px';
  ctx.imageSmoothingEnabled=false;
  buildCache();
}

window.addEventListener('resize',doResize);

const lola={
  x:18, y:GND, w:SPR_COLS, h:SPR_ROWS,
  vy:0, onGround:true,
  af:0, at:0, hit:0,
  jump(){
    if(!this.onGround) return;
    this.vy=-4.0; this.onGround=false;
    spawnFX(this.x+this.w/2, this.y+this.h, 0);
    snd('jump');
  },
  update(dt){
    if(!this.onGround){ this.vy+=0.20*dt; this.y+=this.vy*dt; }
    if(this.y>=GND){ this.y=GND; this.vy=0; this.onGround=true; }
    if(this.hit>0){ this.hit-=dt; return; }
    this.at+=dt;
    if(this.at>=8){ this.at=0; this.af=(this.af+1)%4; }
  },
  draw(){
    const p=ps();
    const fi=this.hit>0?5:(this.onGround?this.af:4);
    const spr=sprCache[fi]; if(!spr) return;
    const ox=sc(this.x), oy=sc(this.y);
    ctx.fillStyle='rgba(0,0,0,.2)';
    ctx.fillRect(ox+p*2, sc(GND+SPR_ROWS)-p, SPR_COLS*p-p*4, p*2);
    ctx.drawImage(spr,ox,oy);
  }
};

// ═══════════════════════════════════════════
// AUDIO CHIPTUNE
// ═══════════════════════════════════════════
let AC=null;
function unlockAudio(){
  if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();
}
function snd(type){
  try{
    if(!AC) return;
    const t=AC.currentTime;
    function sq(f,s2,d,v=.11){
      const o=AC.createOscillator(),g2=AC.createGain();
      o.connect(g2);g2.connect(AC.destination);
      o.type='square';o.frequency.setValueAtTime(f,t+s2);
      g2.gain.setValueAtTime(v,t+s2);
      g2.gain.exponentialRampToValueAtTime(.001,t+s2+d);
      o.start(t+s2);o.stop(t+s2+d+.01);
    }
    if(type==='jump')   {sq(330,0,.05);sq(440,.05,.08);sq(550,.1,.08);}
    if(type==='prize')  {sq(523,0,.06);sq(659,.06,.06);sq(784,.12,.06);sq(1047,.18,.1);}
    if(type==='hit')    {sq(220,0,.06);sq(165,.06,.06);sq(110,.12,.12,.16);}
    if(type==='levelup'){[523,659,784,880,1047,1319].forEach((f,i)=>sq(f,i*.09,.12,.1));}
  }catch(e){}
}

function drawBG(){
  const p=ps();
  const gndPx=sc(GND+SPR_ROWS)-p;
  // cielo en 4 bandas
  const bands=[['#0f172a',0,.25],['#1e3a5f',.25,.5],['#2563eb',.5,.75],['#60a5fa',.75,1]];
  bands.forEach(([c,t1,t2])=>{
    ctx.fillStyle=c;
    ctx.fillRect(0,Math.round(t1*gndPx),CW,Math.round((t2-t1)*gndPx)+1);
  });
  // nubes
  if(bgCloud){
    const cw2=T_CLOUD[0].length*p, ch2=T_CLOUD.length*p;
    CLOUDS.forEach(c=>{
      const cx=((c.x-bgScX*.25)%(DW+cw2)+DW+cw2)%(DW+cw2);
      ctx.drawImage(bgCloud,sc(cx),sc(c.y));
    });
  }
  // hierba tile
  if(bgGrass){
    const tw=T_GRASS[0].length*p, th2=T_GRASS.length*p;
    const off=Math.round(bgScX*SCL*DPR)%tw;
    for(let x2=-off;x2<CW+tw;x2+=tw) ctx.drawImage(bgGrass,x2,gndPx);
    ctx.fillStyle=tS;
    ctx.fillRect(0,gndPx+th2,CW,CH-(gndPx+th2));
  }
}

// ═══════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════
function drawHUD(){
  const p=ps();
  ctx.fillStyle='rgba(0,0,0,.72)';
  ctx.fillRect(0,0,CW,sc(13)+p*2);
  ctx.fillStyle='#fde047';
  ctx.fillRect(0,sc(13)+p*2,CW,p);

  const fsz=Math.max(6,Math.round(p*4.2));
  ctx.font=`bold ${fsz}px 'Courier New',monospace`;
  ctx.textBaseline='middle';
  const mid=sc(6.5)+p;

  ctx.fillStyle='#fde047'; ctx.textAlign='left';
  ctx.fillText(`*${score}`,p*3,mid);
  ctx.fillStyle='#86efac'; ctx.textAlign='center';
  ctx.fillText(`LV.${level}`,CW/2,mid);
  ctx.fillStyle='#f87171'; ctx.textAlign='right';
  ctx.fillText('v'.repeat(Math.max(0,lives)),CW-p*3,mid);

  // barra progreso
  const by=sc(13)+p*3+p, bh=p*2;
  ctx.fillStyle='#1e293b'; ctx.fillRect(0,by,CW,bh);
  const prog=Math.min(lvprog/lvtarget,1);
  if(prog>0){
    const bg=ctx.createLinearGradient(0,0,CW,0);
    bg.addColorStop(0,'#4ade80'); bg.addColorStop(.6,'#facc15'); bg.addColorStop(1,'#f87171');
    ctx.fillStyle=bg;
    ctx.fillRect(0,by,Math.round(CW*prog),bh);
  }
  ctx.fillStyle='rgba(0,0,0,.28)';
  for(let x2=0;x2<CW;x2+=p*4) ctx.fillRect(x2,by,p,bh);
}

// ═══════════════════════════════════════════
// COLISIÓN
// ═══════════════════════════════════════════
function hits(ax,ay,aw,ah,bx,by2,bw,bh,mg=4){
  return ax+mg<bx+bw-mg&&ax+aw-mg>bx+mg&&ay+mg<by2+bh-mg&&ay+ah-mg>by2+mg;
}

function spawnObs(){

  const d=OBS_DEF[di];
  obs.push({x:DW+4,y:GND+SPR_ROWS-d.h,w:d.w,h:d.h,idx:di});

    obs.push({x:DW+4+d.w+8,y:GND+SPR_ROWS-d.h,w:d.w,h:d.h,idx:di});
  }
}
function spawnPrz(){
  const di=Math.random()*PRZ_DEF.length|0;
  const d=PRZ_DEF[di];
  const elev=level>=2&&Math.random()<.42;
  prz.push({x:DW+20,y:elev?GND-16-Math.random()*10:GND+SPR_ROWS-d.h-1,
    w:d.w,h:d.h,idx:di,pts:d.pts,isLife:d.isLife||false,bob:Math.random()*Math.PI*2});

function initGame(){
  score=0;lives=3;level=1;fcount=0;gspeed=1.6;sptimer=0;
  lvprog=0;lvtarget=220;obs=[];prz=[];parts=[];
  lola.y=GND;lola.vy=0;lola.onGround=true;lola.af=0;lola.hit=0;
  flash=0;lastT=0;bgScX=0;
  gstate='playing';
  document.getElementById('jbtn').classList.add('on');
}
function nextLevel(){
  level++;gspeed=1.6+level*.4;lvprog=0;lvtarget=220+level*28;
  obs=[];prz=[];gstate='levelup';snd('levelup');
  document.getElementById('lvlMsg').textContent=`NIVEL ${level-1} COMPLETADO`;
  document.getElementById('lvlNext').textContent=`CARGANDO NIVEL ${level}...`;
  document.getElementById('lus').style.display='flex';
  drawPreview('lvlC',4);
  setTimeout(()=>{document.getElementById('lus').style.display='none';gstate='playing';},2200);
}
function gameOver(){
  gstate='gameover';
  document.getElementById('jbtn').classList.remove('on');
  document.getElementById('goScore').textContent=`PUNTOS: ${score}`;
  document.getElementById('goLevel').textContent=`NIVEL: ${level}`;
  document.getElementById('gos').style.display='flex';
  drawPreview('goC',5);
}

// ═══════════════════════════════════════════
// PREVIEW EN PANTALLAS (canvas pequeño)
// ═══════════════════════════════════════════
function drawPreview(id,fi){
  const cv2=document.getElementById(id); if(!cv2) return;
  const cx2=cv2.getContext('2d'); cx2.imageSmoothingEnabled=false;
  cx2.clearRect(0,0,cv2.width,cv2.height);
  const p2=Math.floor(cv2.width/SPR_COLS);
  const grid=ALL_FRAMES[fi]||ALL_FRAMES[0];
  const ox=(cv2.width-SPR_COLS*p2)/2|0;
  const oy=(cv2.height-SPR_ROWS*p2)/2|0;
  blitGrid(cx2,grid,ox,oy,p2);
}

// ═══════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════
function loop(ts){
  requestAnimationFrame(loop);
  const dt=lastT?Math.min((ts-lastT)/STEP,2.5):1; lastT=ts;

  if(gstate==='playing') bgScX+=gspeed*dt;

  ctx.fillStyle='#0f172a'; ctx.fillRect(0,0,CW,CH);
  drawBG();

  if(gstate!=='playing') return;

  fcount++;
  sptimer+=dt;
  const interval=Math.max(32,90-level*8-(score/80|0)*3);
  if(sptimer>=interval){ spawnObs(); if(Math.random()<.62) spawnPrz(); sptimer=0; }

  lola.update(dt);

  // obstáculos
  obs=obs.filter(o=>{
    o.x-=gspeed*dt;
    if(hits(lola.x,lola.y,lola.w,lola.h,o.x,o.y,o.w,o.h)){
      lives--;flash=24;snd('hit');lola.hit=20;
      spawnFX(lola.x+lola.w/2,lola.y+lola.h/2,1,14);
      obs=[];prz=[];
      if(lives<=0) gameOver(); return false;
    }
    if(obsCache[o.idx]) ctx.drawImage(obsCache[o.idx],sc(o.x),sc(o.y));
    return o.x+o.w>-4;
  });

  // premios
  prz=prz.filter(p2=>{
    p2.x-=gspeed*dt;
    const bob=Math.sin(fcount*.09+p2.bob)*1.2;
    if(hits(lola.x,lola.y,lola.w,lola.h,p2.x,p2.y,p2.w,p2.h,2)){
      score+=p2.pts; lvprog+=p2.pts;
      if(p2.isLife&&lives<5) lives++;
      spawnFX(p2.x+p2.w/2,p2.y,p2.isLife?3:(p2.idx===0?4:2),10);
      snd('prize'); return false;
    }
    if(przCache[p2.idx]) ctx.drawImage(przCache[p2.idx],sc(p2.x),sc(p2.y+bob));
    return p2.x+p2.w>-4;
  });

  lola.draw();

  // partículas
  const p=ps();
  parts=parts.filter(pt=>{
    pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vy+=.12*dt; pt.life-=pt.decay*dt;
    if(pt.life<=0) return false;
    ctx.globalAlpha=pt.life;
    ctx.fillStyle=pt.col;
    const sz=Math.max(p,Math.round(pt.sz*p));
    ctx.fillRect(sc(pt.x),sc(pt.y),sz,sz);
    return true;
  });
  ctx.globalAlpha=1;

  if(flash>0){
    ctx.fillStyle=`rgba(255,30,30,${flash/24*.35})`;
    ctx.fillRect(0,0,CW,CH);
    flash=Math.max(0,flash-dt);
  }

  lvprog+=gspeed*.038*dt;
  if(lvprog>=lvtarget) nextLevel();

  drawHUD();
}

// ═══════════════════════════════════════════
// CONTROLES
// ═══════════════════════════════════════════
function doJump(){ unlockAudio(); if(gstate==='playing') lola.jump(); }

document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.key===' '){ e.preventDefault(); doJump(); }
});
const jb=document.getElementById('jbtn');
jb.addEventListener('touchstart',e=>{ e.preventDefault(); doJump(); },{passive:false});
jb.addEventListener('mousedown',e=>{ e.preventDefault(); doJump(); });
cvs.addEventListener('touchstart',e=>{ e.preventDefault(); doJump(); },{passive:false});
cvs.addEventListener('mousedown',doJump);

document.getElementById('startBtn').addEventListener('click',()=>{
  unlockAudio();
  document.getElementById('ss').style.display='none';
  initGame();
});
document.getElementById('restartBtn').addEventListener('click',()=>{
  unlockAudio();
  document.getElementById('gos').style.display='none';
  initGame();
});

// ═══════════════════════════════════════════
// INICIO
// ═══════════════════════════════════════════
doResize();
drawPreview('titleC',0);
requestAnimationFrame(loop);

})(); // fin IIFE — sin variables globales
</script>
